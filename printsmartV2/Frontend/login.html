<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrintSmart - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #0056b3;
            --text-main: #111827;
            --text-muted: #6B7280;
            --border-color: #E5E7EB;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #F9FAFB 0%, #EBF4FF 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background-color: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .login-icon-wrapper {
            width: 48px;
            height: 48px;
            background-color: #EFF6FF;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }

        .login-header h1 {
            margin: 0 0 8px;
            font-size: 24px;
            font-weight: 700;
            color: var(--text-main);
        }

        .login-header p {
            margin: 0 0 32px;
            font-size: 14px;
            color: var(--text-muted);
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 8px;
        }

        .header-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .forgot-link {
            font-size: 13px;
            color: var(--primary-blue);
            text-decoration: none;
            font-weight: 500;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper svg.icon-left {
            position: absolute;
            left: 12px;
            color: #9CA3AF;
        }
        
        .input-wrapper svg.icon-right {
            position: absolute;
            right: 12px;
            color: #9CA3AF;
            cursor: pointer;
        }

        .input-wrapper input {
            width: 100%;
            padding: 12px 12px 12px 40px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            box-sizing: border-box;
            transition: all 0.2s;
        }

        .input-wrapper input:focus {
            border-color: var(--primary-blue);
            box-shadow: 0 0 0 3px rgba(0, 86, 179, 0.1);
        }

        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 24px;
            text-align: left;
        }

        .checkbox-container input {
            cursor: pointer;
        }

        .checkbox-container label {
            font-size: 13px;
            color: var(--text-main);
            cursor: pointer;
        }

        .btn-submit {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-blue);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .btn-submit:hover {
            background-color: #004494;
        }

        .error-message {
            color: #DC2626;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
            text-align: left;
            font-weight: 500;
        }

        .create-account {
            margin-top: 24px;
            font-size: 13px;
            color: var(--text-muted);
        }

        .create-account a {
            color: var(--primary-blue);
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="login-icon-wrapper">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#0056b3" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="6 9 6 2 18 2 18 9"></polyline>
                <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path>
                <rect x="6" y="14" width="12" height="8"></rect>
            </svg>
        </div>
        
        <div class="login-header">
            <h1>PrintSmart</h1>
            <p>Sign in to manage your printing workflow</p>
        </div>

        <div class="error-message" id="errorMsg">Invalid username or password.</div>

        <div class="form-group">
            <label>Username</label>
            <div class="input-wrapper">
                <svg class="icon-left" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                <input type="text" id="username" placeholder="Enter your username">
            </div>
        </div>

        <div class="form-group">
            <div class="header-between">
                <label style="margin:0;">Password</label>
                <a href="#" class="forgot-link">Forgot password?</a>
            </div>
            <div class="input-wrapper" style="margin-top: 8px;">
                <svg class="icon-left" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                <input type="password" id="password" placeholder="••••••••">
                <svg class="icon-right" id="togglePassword" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </div>
        </div>

        <div class="checkbox-container">
            <input type="checkbox" id="keepLogged">
            <label for="keepLogged">Keep me logged in</label>
        </div>

        <button class="btn-submit" id="loginBtn">
            Login to Dashboard
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
        </button>

    </div>

    <script>
        const loginBtn = document.getElementById('loginBtn');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const errorMsg = document.getElementById('errorMsg');
        const togglePwd = document.getElementById('togglePassword');

        // Toggle password visibility
        togglePwd.addEventListener('click', () => {
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                togglePwd.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>'; // Eye off icon
            } else {
                passwordInput.type = 'password';
                togglePwd.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>'; // Eye icon
            }
        });

        // Handle Login logic
        function handleLogin() {
            const user = usernameInput.value.trim();
            const pass = passwordInput.value;

            if (user === 'Admin' && pass === 'admin123') {
                errorMsg.style.display = 'none';
                // Fake a token save
                localStorage.setItem('printsmart_auth', 'true');
                // Navigate to dashboard
                window.location.href = 'index.html';
            } else {
                errorMsg.style.display = 'block';
            }
        }

        loginBtn.addEventListener('click', handleLogin);
        passwordInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleLogin();
        });
        usernameInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleLogin();
        });

        // If user accesses /login.html while already logged in, we could redirect them, but no big deal for this demo.
    </script>
</body>
</html>
