    <main class="main">
        <header class="top-bar">
            <div class="header-text">
                <h1>Order Management</h1>
                <p>Directory of all Orders and their details.</p>
            </div>
            <div style="display:flex; gap:16px; align-items:center;">
                <div class="search-box">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    <input type="text" id="searchInput" placeholder="Search order by ID or name" style="border:none; outline:none; background:transparent; margin-left:8px; width:100%;">
                </div>
                <button class="btn-primary" id="openAddorderModal">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle; margin-right:4px;"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
                    Add Order
                </button>
            </div>
        </header>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Order ID</th><th>Customer</th><th>Deadline</th>
                        <th>Status</th><th>Total Amount</th><th>Actions</th>
                    </tr>
                </thead>
                <tbody id="ordersTableBody"></tbody>
            </table>
        </div>

        <button class="report-btn" id="reportBtn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="9" y1="9" x2="15" y2="9"/><line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="11" y2="17"/></svg>
            Generate a Report
        </button>

<!-- Add Order Modal -->
<div id="addorderModal" class="modal">
    <div class="modal-content">
        <div class="modal-header"><h2>Add a New Order</h2></div>
        <div class="modal-body">
            <div class="form-group"><label>Customer</label><select id="customer_id" required><option value="" disabled selected>Select Customer</option></select></div>
            <div class="form-row">
                <div class="form-group half"><label>Order Placed Date</label><input type="date" id="order_placed_date" required></div>
                <div class="form-group half"><label>Deadline</label><input type="date" id="deadline" required></div>
            </div>
            <div class="form-group"><label>Status</label>
                <select id="status" required>
                    <option value="" disabled selected>Select Status</option>
                    <option value="Pending">Pending</option>
                    <option value="Processing">Processing</option>
                    <option value="Completed">Completed</option>
                </select>
            </div>
            <div class="form-group"><label>Total Amount</label><input type="number" id="total_amount" placeholder="Enter Total Amount" required></div>
            <div class="form-group"><label>Order Details</label><textarea id="order_details" rows="3" placeholder="Enter Order Details"></textarea></div>
        </div>
        <div class="modal-footer">
            <button class="cancel-btn" id="closeAddorderModal">Cancel</button>
            <button class="save-btn" id="saveOrderBtn">Save Order</button>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
    const ORDER_API = '../../Backend/api/orders.php';

    $(document).ready(function () {
        loadOrders();
        loadCustomers();

        function loadOrders() {
            $.ajax({ url: ORDER_API, type: 'GET', data: { action: 'get_orders' }, dataType: 'json',
                success: function (r) { if (r.success) displayOrders(r.data); else showToast('Error: ' + r.message, 'error'); },
                error: function () { showToast('Error connecting to server', 'error'); }
            });
        }

        function loadCustomers() {
            $.ajax({ url: ORDER_API, type: 'GET', data: { action: 'get_customers' }, dataType: 'json',
                success: function (r) {
                    if (r.success) {
                        const sel = $('#customer_id');
                        sel.empty().append('<option value="" disabled selected>Select Customer</option>');
                        r.data.forEach(c => sel.append(`<option value="${c.id}">${c.name}</option>`));
                    }
                }
            });
        }

        function displayOrders(orders) {
            const tbody = $('#ordersTableBody');
            tbody.empty();
            if (!orders.length) { tbody.html('<tr><td colspan="6" style="text-align:center;">No orders found</td></tr>'); return; }
            orders.forEach(function (o) {
                tbody.append(`
                    <tr data-id="${o.id}">
                        <td class="id-color">${o.order_number}</td>
                        <td>${o.customer_name}</td>
                        <td>${formatDate(o.deadline)}</td>
                        <td><span class="badge ${o.status.toLowerCase()}">${o.status}</span></td>
                        <td>LKR ${parseFloat(o.total_amount).toLocaleString('en-IN',{minimumFractionDigits:2})}</td>
                        <td class="actions">
                            <i class="fa-regular fa-trash-can delete-order" data-id="${o.id}"></i>
                        </td>
                    </tr>`);
            });
        }

        function formatDate(d) { if(!d) return 'N/A'; return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); }

        $('#saveOrderBtn').click(function () {
            const orderData = { customer_id: $('#customer_id').val(), order_date: $('#order_placed_date').val(),
                deadline: $('#deadline').val(), status: $('#status').val(), total_amount: $('#total_amount').val(),
                order_details: $('#order_details').val().trim() };
            if (!orderData.customer_id || !orderData.order_date || !orderData.deadline || !orderData.status || !orderData.total_amount) {
                showToast('Please fill all required fields', 'error'); return;
            }
            $.ajax({ url: ORDER_API, type: 'POST', data: { action: 'add_order', order: orderData }, dataType: 'json',
                success: function (r) { if(r.success) { showToast('Order added!'); $('#addorderModal').hide(); resetModal(); loadOrders(); } else showToast('Error: ' + r.message, 'error'); },
                error: function () { showToast('Error saving order', 'error'); }
            });
        });

        $(document).on('click', '.delete-order', function () {
            const id = $(this).data('id');
            if (confirm('Delete this order?')) {
                $.ajax({ url: ORDER_API, type: 'POST', data: { action: 'delete_order', id: id }, dataType: 'json',
                    success: function (r) { if(r.success) { showToast('Order deleted!'); loadOrders(); } else showToast('Error: ' + r.message,'error'); }
                });
            }
        });

        $('#searchInput').on('keyup', function () {
            const t = $(this).val().toLowerCase();
            $('#ordersTableBody tr').each(function () {
                const show = $(this).find('td:first').text().toLowerCase().includes(t) || $(this).find('td:eq(1)').text().toLowerCase().includes(t);
                $(this).toggle(show);
            });
        });

        $('#openAddorderModal').click(function () { resetModal(); $('#addorderModal').css({'display':'flex','align-items':'center','justify-content':'center'}); });
        $('#closeAddorderModal').click(function () { $('#addorderModal').hide(); });
        $(window).click(function (e) { if ($(e.target).is('#addorderModal')) $('#addorderModal').hide(); });

        function resetModal() { $('#customer_id,#order_placed_date,#deadline,#status,#total_amount,#order_details').val(''); }

        function showToast(msg, type = 'success') {
            const t = $(`<div class="toast-notification ${type}">${msg}</div>`);
            $('body').append(t);
            setTimeout(() => t.fadeOut(300, function(){ $(this).remove(); }), 3000);
        }
    });
</script>
</body>
</html>
